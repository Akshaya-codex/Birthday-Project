<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>
</head>
<body>
    <link rel="stylesheet" href="style.css">
    <h1 class="text">Happy Birthdayy❤️! </h1>
    <div class="cake">
        <div class="layer3"></div>
        <div class="layer2"></div>
        <div class="layer1"></div>
        <div class="candle"></div>
        <div class="flame"></div>   
        <div class="gift">
            <img src="https://png.pngtree.com/png-clipart/20231016/original/pngtree-a-blue-gift-box-tied-with-a-white-ribbon-png-image_13324386.png" class="gift-img" alt="Gift Box" height="300" width="350">
            <div class="message">
                <h1>On this beautiful day, I want you to know how incredibly special you are.  I hope that joy and prosperity follow you everywhere.</h1>
                <h1>May this year bring you closer to your dreams and fill your life with amazing adventures!</h1>
            <h1>With love❤️!!</h1>
            </div>
        </div>
    </div>
</body>
</html>
